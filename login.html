<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senai Instrumentos - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">

    <div class="music-notes-layer"></div>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card-login animar show">
            <div class="text-center mb-5">
                <h2 class="fw-bold" style="color: #222d52;">Bem-vindo de volta</h2>
                <div class="divisor-pequeno"></div>
            </div>

            <form>
                <div class="mb-4">
                    <label class="form-label fw-bold" style="color: #222d52;">E-mail</label>
                    <input type="email" class="form-control custom-input" placeholder="seu@email.com">
                </div>
                
                <div class="mb-2">
                    <label class="form-label fw-bold" style="color: #222d52;">Senha</label>
                    <input type="password" class="form-control custom-input" placeholder="••••••••">
                </div>
                
                <div class="text-end mb-4">
                    <a href="#" class="text-decoration-none" style="color: #4a5c91; font-size: 0.85rem;">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-login w-100 mb-4">Entrar na Orquestra</button>
                
                <div class="text-center">
                    <span style="color: #555;">Novo por aqui? 
                        <a href="cadastro.html" style="color: #222d52; font-weight: 800; text-decoration: none; border-bottom: 2px solid #222d52;">Crie sua conta</a>
                    </span>
                </div>
            </form>
        </div>
    </div>

    <!-- <script src="script.js"></script> -->
</body>
</html>
